services:
  db:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osint_dev}
      POSTGRES_DB: osint
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint -d osint"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  caddy:
    image: caddy:2.8-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
      web:
        condition: service_started

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv sync --frozen && uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - /app/.venv

  worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: >
      sh -c "uv sync --frozen && uv run python -m src.worker"
    volumes:
      - ./backend:/app
      - /app/.venv

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_config:
